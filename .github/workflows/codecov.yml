name: Codecov (reusable)

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        description: 'Git ref to checkout'
    secrets:
      CODECOV_TOKEN:
        required: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  codecov:
    name: 📊 Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Debug coverage files
        run: |
          pwd
          ls -la
          ls -la cover 2>/dev/null || echo "no cover dir"
          ls -la coverage 2>/dev/null || echo "no coverage dir"
          find . -name "excoveralls.xml" -o -name "*.xml" 2>/dev/null || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: notification-service-coverage
          fail_ci_if_error: true
          verbose: true
